<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='Add_interview.css') }}">
    <title>Add Interview</title>
</head>
<body>
     <div class="header">

   
        <div class="nav">

            <h1 class="title">

                <span class="highlight1">Career</span> 
                <span class="highlight2">Flow</span>

            
            </h1>

        </div>

        <div class="page">
                
                <a class="nav-item " href="{{ url_for('dashboard.dashboard_page') }}">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
        

                <a class="nav-item active" href="{{ url_for('interview.add_interview') }}">
                    <span class="material-symbols-outlined">add_circle</span>
                    <span>Add Interview</span>
                </a>

                <a class="nav-item" href="{{ url_for('history.history_page') }}">
                    <span class="material-symbols-outlined">history</span>
                    <span>History</span>
                </a>

                <a class="nav-item" href="{{ url_for('ai.ai_insights') }}">
                    <span class="material-symbols-outlined">network_intel_node</span>
                    <span>AI Insight</span>
                </a>

                <a class="nav-item" href="{{ url_for('auth.logout') }}">
                    <span class="material-symbols-outlined">logout</span>
                    <span>Logout</span>
                </a>
        </div>
    
    </div>

    <div class="username">
            <h1 class="heading">Add Interview</h1> 
    </div>

    <form action="{{url_for('interview.add_interview')}}" method="POST">
    <div class="container">
        <p class="subtext">Fill in the details of your interview</p>

        <div class="side">

            <div class="input-group">
                <label for="company-name" class="text">Company Name </label>
                <input class="label" type="text" id="company-name" name="company-name" placeholder="e.g. Google,Tcs" required>
            </div>

            
            <div class="input-group">
                <label for="role" class="text">Role </label>
                <input class="label" type="text" id="role" name="role" placeholder="e.g. Software Engineer,Data Scientist" required>
            </div>

        </div>  
        

        <div class="side1">

            <div class="input-group">
                <label for="date" class="text">Interview Date </label>
                <input class="label" type="date" id="date" name="date" required>
            </div>

            
            <div class="input-group">
              <label for="status" class="text">Status</label>

              <select id="status" name="status" class="label" required>
                  <option value="" selected disabled>Select Status</option>
                  <option value="Selected">Selected</option>
                  <option value="Rejected">Rejected</option>
                  <option value="Pending">Pending</option>
              </select>

            </div>

        </div>  

        <div class="side2">

            <div class="input-group">
                <label  class="text" id="ra">Rounds Attended </label>
            </div>

            <div class="input-group">
                <label><input type="checkbox" name="choice" value="Aptitude" > Aptitude</label>
            </div>

            <div class="input-group">
                <label><input type="checkbox" name="choice" value="Group Decision" > GD</label>
            </div>
            
            
            <div class="input-group">
                <label><input type="checkbox" name="choice" value="Coding"> Coding</label>
            </div>

            <div class="input-group">
                <label><input type="checkbox" name="choice" value="Technical-Interview"> Technical Interview</label>
            </div>
            
            <div class="input-group">
                <label><input type="checkbox" name="choice" value="HR-Interview"> HR Interview</label>         
            </div>
            
        </div>
        
        <div class="find-out">

            <div class="input-group" id="NM">
                <label  class="text">Notes / Mistakes </label>
    
            </div>

        </div>  

        <div class="text-area">
            <div class="text-box">
                    <textarea name="notes" placeholder="What went wrong? What could you improve" rows="5" cols="100" required></textarea>
            </div>
        </div>

        <div class="btn">
            <button type="submit">Save Interview Record</button>
        </div>
         
    </div>
    </form>
</body>
</html>
